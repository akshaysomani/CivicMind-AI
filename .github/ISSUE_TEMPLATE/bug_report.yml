name: 🐛 Bug Report
description: Report a bug or unintended behavior in CivicMind AI
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the details below to help us reproduce and resolve the issue.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: E.g., The Leaflet ward boundary map does not load markers when switching to dark mode.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Sign in as Citizen.
        2. Navigate to '/dashboard/citizen/map'.
        3. Switch theme to Dark Mode in layout navigation.
        4. Observe map overlay behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: E.g., Markers should remain visible and render with appropriate color contrast.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment Info
      description: OS version, browser, Node version, Python version, etc.
      placeholder: E.g., Chrome 125, Windows 11, Node v22.1
  - type: textarea
    id: logs
    attributes:
      label: Error Logs or Screenshots
      description: If applicable, add error logs or drag-and-drop screenshots here.
      placeholder: Paste console stack trace or backend logs.

name: 🚀 Feature Request
description: Propose a new feature, enhancement, or optimization for CivicMind AI
labels: ["enhancement", "feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        We are excited to hear about your feature ideas! Please provide as much details as possible about the desired addition.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem or limitation? Please describe.
      placeholder: E.g., It is difficult to visualize ward metrics without a dedicated charts dashboard.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
      placeholder: E.g., Add a dedicated analytics tab inside the Government workspace showing Recharts line layouts.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A description of any alternative solutions or features you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockup drawings, or references here.
